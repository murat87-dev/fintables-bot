name: Fintables Haber Toplayici

on:
  schedule:
    - cron: '*/20 6-16 * * 1-5'
  workflow_dispatch:

jobs:
  haber-topla:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutuphaneleri yukle
        run: pip install curl_cffi gspread google-auth

      - name: Haberleri cek ve Sheets'e yaz
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python fintables_sheets.py
